name: Flutter CI

on:
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: cd flutter/akwaba_invest && flutter pub get

      - name: Run tests
        run: cd flutter/akwaba_invest && flutter test
